name: MeetingRecorder
options:
  bundleIdPrefix: com.meetingrecorder
  deploymentTarget:
    macOS: "14.0"
  xcodeVersion: "15.0"
  generateEmptyDirectories: true

settings:
  base:
    SWIFT_VERSION: "5.9"
    MACOSX_DEPLOYMENT_TARGET: "14.0"
    DEVELOPMENT_TEAM: ""
    CODE_SIGN_IDENTITY: "-"
    CODE_SIGN_STYLE: Manual

targets:
  MeetingRecorder:
    type: application
    platform: macOS
    sources:
      - path: MeetingRecorder
        excludes:
          - Resources/Info.plist
    info:
      path: MeetingRecorder/Resources/Info.plist
    entitlements:
      path: MeetingRecorder/Resources/MeetingRecorder.entitlements
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.meetingrecorder.app
        PRODUCT_NAME: Meeting Recorder
        INFOPLIST_FILE: MeetingRecorder/Resources/Info.plist
        CODE_SIGN_ENTITLEMENTS: MeetingRecorder/Resources/MeetingRecorder.entitlements
        LD_RUNPATH_SEARCH_PATHS: "@executable_path/../Frameworks"
        ENABLE_HARDENED_RUNTIME: false
